<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Client - YOUNIQUE-</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header>
        <div class="logo">
            <a href="../index.html" class="logo-text">-<i>YOUNIQUE</i>-</a>
            
        </div>
        <nav>
            <ul>
                <li><a href="./index.html">Accueil</a></li>
                <li><a href="./prestation.html">Prestations</a></li>
                <li><a href="./reservation.html">Réservation</a></li>
                <li><a href="./connexion.html" class="active" id="nav-auth">Connexion</a></li>
            </ul>
        </nav>
    </header>

    <main class="container auth-container">
        <div class="form-box" id="login-box">
            <h2>Connexion</h2>
            <form id="form-login" onsubmit="gererConnexion(event)">
                <div class="form-group">
                    <label for="login-email">Email :</label>
                    <input type="email" id="login-email" required placeholder="exemple@mail.com">
                </div>
                <div class="form-group">
                    <label for="login-password">Mot de passe :</label>
                    <input type="password" id="login-password" required placeholder="Votre mot de passe">
                </div>
                <button type="submit" class="btn btn-block">Se connecter</button>
                <p class="toggle-form">Vous avez pas un  compte ? <a href="#" onclick="basculerFormulaire('register')">S'inscrire</a></p>
            </form>
            <div id="login-error" class="error-box" style="display:none;"></div>
        </div>

        <div class="form-box" id="register-box" style="display:none;">
            <h2>Inscription</h2>
            <form id="form-register" onsubmit="gererInscription(event)">
                <div class="form-group">
                    <label for="reg-nom">Nom complet :</label>
                    <input type="text" id="reg-nom" required placeholder="Nom et Prénom">
                </div>
                <div class="form-group">
                    <label for="reg-email">Email :</label>
                    <input type="email" id="reg-email" required placeholder="exemple@mail.com">
                    <small class="error-text" id="reg-email-error"></small>
                </div>
                <div class="form-group">
                    <label for="reg-password">Mot de passe (6 car. min) :</label>
                    <input type="password" id="reg-password" required placeholder="Créer un mot de passe">
                    <small class="error-text" id="reg-pass-error"></small>
                </div>
                <button type="submit" class="btn btn-block">Créer un compte</button>
                <p class="toggle-form">Déjà inscrit ? <a href="#" onclick="basculerFormulaire('login')">Se connecter</a></p>
            </form>
            <div id="register-success" class="success-box" style="display:none;"></div>
        </div>

        <div class="form-box" id="welcome-box" style="display:none;">
            <h2>Mon Espace</h2>
            <p id="welcome-text"></p>
            <button class="btn btn-danger" onclick="deconnexion()">Se déconnecter</button>
        </div>
    </main>

    <footer>
        <p>&copy; -<i> YOUNIQUE </i>- Tous droits réservés.</p>
    </footer>

    <script src="./main.js"></script>
    
<script>

    window.onload = function() {
        verifierSession('../');      
        afficherEspacePerso();       
    };
</script>
       
</body>
</html>
